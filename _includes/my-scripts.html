<script src="/assets/js/sidebar-folder.js"></script>
<script>
  function initPortfolioFilter() {
    var btns = document.querySelectorAll(".filter-btn");
    if (!btns.length) return;
    btns.forEach(function(btn) {
      btn.addEventListener("click", function() {
        var active = document.querySelector(".filter-btn.active");
        if (active) active.classList.remove("active");
        btn.classList.add("active");
        var filter = btn.getAttribute("data-filter");
        document.querySelectorAll(".grid-item").forEach(function(item) {
          item.style.display = (filter === "*" || item.classList.contains(filter)) ? "" : "none";
        });
      });
    });
  }
  document.addEventListener("DOMContentLoaded", initPortfolioFilter);
</script>
<script src="/assets/js/clap-button.js"></script>
{% if site.lightbox %}
  <script src="/assets/js/lightbox.js"></script>
{% endif %}

<script type="module">
  {% if site.mermaid %}
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";
  let config = {
    startOnLoad: true,
    fontFamily: "JetBrains Mono",
    theme: "dark"
  };
  mermaid.initialize(config);
  mermaid.run({ querySelector: ".language-mermaid" });
  {% endif %}
  document
    .getElementById("_pushState")
    .addEventListener("hy-push-state-load", function () {
      get_clap_count();
      {% if site.mermaid %} mermaid.run({ querySelector: ".language-mermaid" }); {% endif %}
      {% if site.lightbox %} apply_lightbox(); {% endif %}
      initPortfolioFilter();
    });
</script>
